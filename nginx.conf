server {
    listen 8080;
    server_name fordsbranch.church www.fordsbranch.church;
    root /usr/share/nginx/html;
    index index.html;

    #Compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 512;

    # ── Hide Nginx version from error pages and headers ──────────────
    server_tokens off;

    # ── Security headers ──────────────────────────────────────────────
    # Cloudflare also sets some of these at the edge; kept here as
    # defense-in-depth. No *enforced* CSP on purpose: the Tithe.ly widget and
    # the Google Docs/Calendar/Maps embeds would need constant allowlist upkeep,
    # and a mistake would break the Give button. A Content-Security-Policy-
    # Report-Only header (below) observes the footprint without blocking.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Cloudflare overrides this to "same-origin" at the edge; keep origin in sync.
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── CSP in Report-Only: observes violations, never blocks. Safe to ship. ──
    # Origins below are everything the site loads today. 'unsafe-inline' is
    # required because every page has inline <script> (nav toggle, verse-of-the-
    # day, tithely init) and pervasive inline style="" attributes — so an
    # *enforced* CSP could not drop it without reworking the pages. See README
    # before enforcing. Reports surface in the browser DevTools console.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://tithe.ly; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://tithe.ly https://giving.tithely.com; connect-src 'self' https://labs.bible.org https://tithe.ly https://giving.tithely.com; frame-src https://docs.google.com https://calendar.google.com https://maps.google.com https://tithe.ly https://giving.tithely.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://tithe.ly https://giving.tithely.com; object-src 'none'" always;

    # ── Only allow GET and HEAD — no POST, PUT, DELETE etc ───────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Clean URLs ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Block access to hidden files (.git, .env etc) ─────────────────
    # Kept before the cache locations: first matching regex wins, so a
    # dotfile like /.foo.css must hit this deny, not the css rule.
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common exploit probes ───────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        deny all;
        return 404;
    }

    # ── Cache images & fonts for a year ───────────────────────────────
    # When replacing an image, upload it under a NEW filename and update
    # the HTML, or browsers keep the old one for up to a year.
    # 'expires' only here — an add_header inside a location would drop
    # ALL the inherited security headers above (nginx inheritance rule).
    location ~* \.(png|jpg|jpeg|gif|ico|webp|avif|svg|woff2)$ {
        expires 1y;
    }

    # ── Cache CSS/JS for a day ────────────────────────────────────────
    # Bump the ?v= query string in the HTML when style.css changes so
    # returning visitors pick it up immediately.
    location ~* \.(css|js)$ {
        expires 1d;
    }

    # ── Custom 404 ────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
