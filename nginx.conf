server {
    listen 8080;
    server_name fordsbranch.church www.fordsbranch.church;
    root /usr/share/nginx/html;
    index index.html;

    #Compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 512;

    # ── Hide Nginx version from error pages and headers ──────────────
    server_tokens off;

    # ── Security headers ──────────────────────────────────────────────
    # Cloudflare also sets some of these at the edge; kept here as
    # defense-in-depth.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Cloudflare overrides this to "same-origin" at the edge; keep origin in sync.
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Enforced CSP ──────────────────────────────────────────────────
    # Footprint was mapped in Report-Only across every page (front/bulletin/
    # give) before enforcing: the ONLY thing the policy would have blocked was
    # the Cloudflare Insights beacon, now allowlisted. The entire Tithe.ly →
    # Stripe → Plaid → hCaptcha → reCAPTCHA payment stack loads *inside* the
    # tithe.ly iframe, so it answers to Tithe.ly's CSP, not this one — our
    # frame-src just needs tithe.ly/giving.tithely.com.
    #
    # Origins below are everything the site loads today, including the
    # Cloudflare Insights beacon (static.cloudflareinsights.com for the script,
    # cloudflareinsights.com for its RUM POST) — auto-injected at the edge by
    # Cloudflare Web Analytics, so it is not referenced in the HTML. 'unsafe-inline'
    # is required because every page has inline <script> (nav toggle, verse-of-the-
    # day, tithely init) and pervasive inline style="" attributes — dropping it
    # would mean reworking the pages. To go back to observing, rename this header
    # to Content-Security-Policy-Report-Only.
    #
    # frame-src note: the location-page map iframes use maps.google.com/maps?...
    # &output=embed, which 302-redirects to www.google.com/maps/embed. CSP checks
    # the redirect TARGET, so www.google.com must be listed or both campus maps
    # break. (calendar.google.com and docs.google.com serve directly, no redirect.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://tithe.ly https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://tithe.ly https://giving.tithely.com; connect-src 'self' https://labs.bible.org https://tithe.ly https://giving.tithely.com https://cloudflareinsights.com; frame-src https://docs.google.com https://calendar.google.com https://maps.google.com https://www.google.com https://tithe.ly https://giving.tithely.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://tithe.ly https://giving.tithely.com; object-src 'none'" always;

    # ── Only allow GET and HEAD — no POST, PUT, DELETE etc ───────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Clean URLs ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Block access to hidden files (.git, .env etc) ─────────────────
    # Kept before the cache locations: first matching regex wins, so a
    # dotfile like /.foo.css must hit this deny, not the css rule.
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common exploit probes ───────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        deny all;
        return 404;
    }

    # ── Cache images & fonts for a year ───────────────────────────────
    # When replacing an image, upload it under a NEW filename and update
    # the HTML, or browsers keep the old one for up to a year.
    # 'expires' only here — an add_header inside a location would drop
    # ALL the inherited security headers above (nginx inheritance rule).
    location ~* \.(png|jpg|jpeg|gif|ico|webp|avif|svg|woff2)$ {
        expires 1y;
    }

    # ── Cache CSS/JS for a day ────────────────────────────────────────
    # Bump the ?v= query string in the HTML when style.css changes so
    # returning visitors pick it up immediately.
    location ~* \.(css|js)$ {
        expires 1d;
    }

    # ── Custom 404 ────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
